<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disrupta — Innovation Audit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--ds-bg-1);
      color: var(--ds-c-10);
      background-image: radial-gradient(circle at center, var(--bg-dot-color) 0.95px, transparent 1px);
      background-size: 20px 20px;
      background-attachment: fixed;
    }
    ::selection { background: var(--ds-blue); color: #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-headline, .hero-sub { animation: fadeUp 700ms cubic-bezier(0.16,1,0.3,1) both; }
    .hero-sub { animation-delay: 100ms; }

    @keyframes hudBlink {
      0%, 60% { opacity: 1; }
      61%, 100% { opacity: 0.2; }
    }

    .skip-to-content {
      position: absolute;
      left: -9999px;
      top: 0;
      z-index: 100;
      padding: 0.5rem 1rem;
      background: var(--ds-c-10);
      color: var(--ds-bg-1);
    }
    .skip-to-content:focus {
      left: 0.5rem;
      top: 0.5rem;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js" crossorigin></script>
</head>
<body>
  <a href="#main" class="skip-to-content">Ir para o conteúdo</a>
  <div id="root" aria-busy="true">A carregar UI kit…</div>
  <script src="boot.js"></script>
</body>
</html>
