<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <title>DIS — Storybook</title>
    <link rel="stylesheet" href="design-system/index.css" />
    <link rel="stylesheet" href="disrupta-ui.css" />
    <style>
      :root {
        --sb-sidebar: 17.5rem;
        --sb-toolbar-h: 2.75rem;
        --sb-preview-pad: 1rem;
        --sb-stroke: 1px;
        --sb-border: var(--dis-glass-border, var(--border));
        --sb-text: var(--text);
        --sb-muted: var(--text-muted);
        --sb-focus: var(--ds-blue);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: var(--font-sans);
        background: transparent;
        color: var(--sb-text);
      }
      .sb-skip {
        position: fixed;
        top: 0;
        left: 0.65rem;
        z-index: 300;
        padding: 0.45rem 0.75rem;
        border-radius: var(--radius-sm);
        color: var(--sb-text);
        font-size: 0.8125rem;
        text-decoration: none;
        transform: translateY(-130%);
        transition: transform 0.15s ease;
      }
      .sb-skip:focus {
        outline: none;
        box-shadow: var(--ds-focus-ring);
        transform: translateY(0.35rem);
      }
      .sb-app {
        display: grid;
        grid-template-columns: var(--sb-sidebar) 1fr;
        grid-template-rows: 1fr;
        height: 100%;
        min-height: 0;
        position: relative;
        z-index: 1;
      }
      @media (max-width: 720px) {
        .sb-app {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        .sb-sidebar {
          border-right: none;
          border-bottom: var(--sb-stroke) solid var(--sb-border);
          max-height: 40vh;
          overflow: auto;
        }
        .sb-sidebar.is-collapsed .sb-nav {
          display: none;
        }
      }
      .sb-sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: var(--sb-stroke) solid var(--sb-border);
      }
      .sb-sidebar__head {
        padding: 1rem 1rem 0.75rem;
        flex-shrink: 0;
      }
      .sb-sidebar__brand {
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--sb-muted);
        margin: 0 0 0.2rem;
      }
      .sb-sidebar__title {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.02em;
      }
      .sb-sidebar__sub {
        font-size: 0.75rem;
        color: var(--sb-muted);
        margin: 0.35rem 0 0;
        line-height: 1.4;
      }
      .sb-toggle {
        display: none;
        margin: 0.5rem 1rem 0;
        padding: 0.4rem 0.65rem;
        font: inherit;
        font-size: 0.8125rem;
        border-radius: var(--radius-sm);
        color: var(--sb-text);
        cursor: pointer;
      }
      .sb-toggle:focus-visible {
        outline: none;
        box-shadow: var(--ds-focus-ring);
      }
      @media (max-width: 720px) {
        .sb-toggle {
          display: block;
        }
      }
      .sb-nav {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 0.5rem 0 1rem;
      }
      .sb-nav__group {
        margin-top: 0.75rem;
      }
      .sb-nav__label {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--sb-muted);
        padding: 0.35rem 1rem;
        margin: 0;
      }
      .sb-nav__list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .sb-nav__item {
        margin: 0;
      }
      .sb-nav__btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
        text-align: left;
        padding: 0.55rem 1rem;
        border: none;
        color: var(--sb-text);
        font: inherit;
        font-size: 0.875rem;
        cursor: pointer;
        border-left: var(--sb-stroke) solid transparent;
        transition:
          background-color 0.28s var(--ease-bugatti, ease),
          border-color 0.28s var(--ease-bugatti, ease);
      }
      .sb-nav__btn:focus-visible {
        outline: none;
        box-shadow: inset 0 0 0 var(--sb-stroke) var(--sb-focus);
      }
      .sb-nav__btn[aria-current="page"] {
        border-left-color: var(--text);
        font-weight: 500;
      }
      .sb-nav__ico {
        width: 1.1rem;
        height: 1.1rem;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .sb-nav__meta {
        display: block;
        font-size: 0.6875rem;
        color: var(--sb-muted);
        font-weight: 400;
        margin-top: 0.1rem;
      }
      .sb-nav__open {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        margin: 0.15rem 1rem 0;
        font-size: 0.6875rem;
        color: var(--text);
        opacity: 0.6;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }
      .sb-nav__open:hover {
        opacity: 1;
      }
      .sb-nav__open:focus-visible {
        outline: none;
        box-shadow: var(--ds-focus-ring);
        border-radius: var(--radius-sm);
      }
      .sb-main {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: transparent;
      }
      .sb-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 0.5rem;
        min-height: var(--sb-toolbar-h);
        padding: 0.35rem 0.65rem;
        border-bottom: var(--sb-stroke) solid var(--sb-border);
      }
      .sb-toolbar__label {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--sb-muted);
        margin-right: 0.25rem;
      }
      .sb-chip {
        font: inherit;
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.28rem 0.55rem;
        border-radius: var(--radius-sm);
        border: var(--sb-stroke) solid var(--sb-border);
        color: var(--sb-text);
        cursor: pointer;
        transition:
          background-color 0.28s var(--ease-bugatti, ease),
          border-color 0.28s var(--ease-bugatti, ease);
      }
      .sb-chip:focus-visible {
        outline: none;
        box-shadow: var(--ds-focus-ring);
      }
      .sb-chip[aria-pressed="true"] {
        border-color: var(--dis-glass-border-strong, var(--text));
        background: var(--dis-glass-bg-strong);
      }
      .sb-toolbar__spacer {
        flex: 1;
        min-width: 0.5rem;
      }
      .sb-reload {
        font: inherit;
        font-size: 0.75rem;
        padding: 0.28rem 0.6rem;
        border-radius: var(--radius-sm);
        border: var(--sb-stroke) solid var(--sb-border);
        color: var(--sb-text);
        cursor: pointer;
        transition:
          background-color 0.28s var(--ease-bugatti, ease),
          border-color 0.28s var(--ease-bugatti, ease);
      }
      .sb-reload:focus-visible {
        outline: none;
        box-shadow: var(--ds-focus-ring);
      }
      .sb-preview {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: var(--sb-preview-pad);
        overflow: auto;
        background-color: transparent;
        background-image: radial-gradient(
          circle at center,
          var(--bg-dot-color) 0.95px,
          transparent 1px
        );
        background-size: var(--bg-dot-size) var(--bg-dot-size);
        background-position: 0 0;
      }
      .sb-frame-wrap {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-width: 0;
      }
      .sb-frame-wrap[data-viewport="full"] {
        align-items: stretch;
      }
      .sb-frame {
        width: 100%;
        max-width: var(--sb-frame-max, 100%);
        height: 100%;
        min-height: calc(100vh - var(--sb-toolbar-h) - var(--sb-preview-pad) * 2 - 2rem);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .sb-frame iframe {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 560px;
        border: 0;
      }
      .sb-status {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--sb-muted);
        padding: 0 0.5rem;
        max-width: 40%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>

      (function () {
        var STORIES = {
          "ds-colors-stark": { src: "design-system/preview/colors-stark.html", title: "DS · Colors Stark" },
          "ds-colors-semantic": { src: "design-system/preview/colors-semantic.html", title: "DS · Colors Semantic" },
          "ds-colors-light": { src: "design-system/preview/colors-light.html", title: "DS · Colors Light" },
          "ds-type-scale": { src: "design-system/preview/type-scale.html", title: "DS · Type Scale" },
          "ds-type-specimens": { src: "design-system/preview/type-specimens.html", title: "DS · Type Specimens" },
          "ds-buttons": { src: "design-system/preview/buttons.html", title: "DS · Buttons" },
          "ds-inputs": { src: "design-system/preview/inputs.html", title: "DS · Inputs" },
          "ds-badges": { src: "design-system/preview/badges.html", title: "DS · Badges" },
          "ds-cards": { src: "design-system/preview/cards.html", title: "DS · Cards" },
          "ds-glassmorphism": { src: "design-system/preview/glassmorphism.html", title: "DS · Glassmorphism" },
          "ds-shadows": { src: "design-system/preview/shadows.html", title: "DS · Shadows" },
          "ds-spacing": { src: "design-system/preview/spacing-tokens.html", title: "DS · Spacing" },
          "ds-logo": { src: "design-system/preview/logo-usage.html", title: "DS · Logo" },
          "ds-landing": { src: "design-system/Disrupta%20Landing.html", title: "DS · Landing" },
          "atoms-v2": {
            src: "disrupta-v2-atomic.html#atoms",
            title: "Atoms · Disrupta-v2",
          },
          "molecules-v2": {
            src: "disrupta-v2-atomic.html#molecules",
            title: "Molecules · Disrupta-v2",
          },
          "organisms-v2": {
            src: "disrupta-v2-atomic.html#organisms",
            title: "Organisms · Disrupta-v2",
          },
          "organisms-pricing-dialog": {
            src: "organisms-pricing-dialog.html",
            title: "Organism · Pricing Dialog",
          },
          "organisms-notification-dialog": {
            src: "organisms-notification-dialog.html",
            title: "Organism · Notification Dialog",
          },
          "organisms-float-dash": {
            src: "organisms-float-dash.html",
            title: "Organism · Float Dash",
          },
          "proto-laboratorio": {
            src: "laboratorio-ideias.html",
            title: "Protótipo · Laboratório de Ideias",
          },
          "proto-evaluation-v2": {
            src: "evaluation-v2.html",
            title: "Protótipo · Calculadora SIID v2",
          },
          "proto-evaluation": {
            src: "evaluation.html",
            title: "Protótipo · Redirect → v2",
          },
          "proto-evaluation-result": {
            src: "evaluation-result.html",
            title: "Protótipo · Avaliação (resultado)",
          },
        };

        var iframe = document.getElementById("sb-preview-frame");
        var frameWrap = document.getElementById("sb-frame-wrap");
        var openTab = document.getElementById("sb-open-tab");
        var statusEl = document.getElementById("sb-status");
        var navButtons = document.querySelectorAll(".sb-nav__btn[data-story]");
        var viewportButtons = document.querySelectorAll(".sb-chip[data-viewport]");
        var reloadBtn = document.getElementById("sb-reload");
        var sidebar = document.getElementById("sb-sidebar");
        var navToggle = document.getElementById("sb-toggle");
        function getHashStory() {
          var h = (location.hash || "").replace(/^#/, "");
          if (h.indexOf("story=") === 0) {
            var id = h.slice("story=".length).split("&")[0];
            return STORIES[id] ? id : "ds-colors-stark";
          }
          return "ds-colors-stark";
        }

        function setHashStory(id) {
          if (STORIES[id]) {
            location.hash = "story=" + id;
          }
        }

        function setViewport(mode) {
          var max = "100%";
          if (mode === "mobile") max = "390px";
          if (mode === "tablet") max = "834px";
          frameWrap.style.setProperty("--sb-frame-max", max);
          frameWrap.dataset.viewport = mode === "desktop" ? "full" : mode;
          viewportButtons.forEach(function (b) {
            var m = b.getAttribute("data-viewport");
            var on = (mode === "desktop" && m === "desktop") || mode === m;
            b.setAttribute("aria-pressed", on ? "true" : "false");
          });
        }

        function selectStory(id, pushHash) {
          if (!STORIES[id]) id = "ds-colors-stark";
          var s = STORIES[id];
          iframe.src = s.src;
          iframe.title = "Pré-visualização: " + s.title;
          openTab.href = s.src;
          statusEl.textContent = s.src;
          navButtons.forEach(function (btn) {
            if (btn.getAttribute("data-story") === id) {
              btn.setAttribute("aria-current", "page");
            } else {
              btn.removeAttribute("aria-current");
            }
          });
          if (pushHash) setHashStory(id);
        }

        navButtons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            selectStory(btn.getAttribute("data-story"), true);
            if (window.matchMedia("(max-width: 720px)").matches && sidebar) {
              sidebar.classList.add("is-collapsed");
              navToggle.setAttribute("aria-expanded", "false");
            }
          });
        });

        viewportButtons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var m = btn.getAttribute("data-viewport");
            if (m === "desktop") setViewport("desktop");
            else if (m === "tablet") setViewport("tablet");
            else setViewport("mobile");
          });
        });

        reloadBtn.addEventListener("click", function () {
          try {
            iframe.contentWindow.location.reload();
          } catch (e) {
            iframe.src = iframe.src;
          }
        });

        window.addEventListener("hashchange", function () {
          selectStory(getHashStory(), false);
        });

        navToggle.addEventListener("click", function () {
          var collapsed = sidebar.classList.toggle("is-collapsed");
          navToggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
        });

        selectStory(getHashStory(), false);
        setViewport("desktop");
      })();
    </script>
  </body>
</html>
